version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/postgres/sqlc/schema.sql"
    queries: "internal/postgres/sqlc/queries.sql"
    gen:
      go:
        package: "db"
        out: "internal/postgres/db"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: false
        emit_exact_table_names: false
